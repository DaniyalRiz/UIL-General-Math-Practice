<script>
  window.addEventListener("error", function(e){
    var r = document.getElementById("root");
    if(r && r.dataset.loaded !== "1"){ r.innerHTML = "<div style='padding:40px;font-family:sans-serif;color:#b91c1c'><b>Something went wrong loading the app.</b><br><br>" + (e.message||"") + "</div>"; }
  });
</script>
<div id="root"><div style="padding:40px;text-align:center;font-family:sans-serif;color:#64748b">Loading practice questions…</div></div>


<script type="text/babel" data-presets="react">

// ── Problem list (row layout) ────────────────────────────────────────────────
function ProblemRow({ q, n, onOpen }) {
  return (
    <button onClick={onOpen}
      className="group w-full grid grid-cols-[2.5rem_1fr_auto] sm:grid-cols-[3rem_1fr_9rem_7rem_11rem_7rem] items-center gap-3 px-4 py-3 text-left
                 border-b border-slate-100 dark:border-slate-800
                 hover:bg-slate-50 dark:hover:bg-slate-900/60 transition-colors">
      <div className="flex items-center gap-2">
        <span className="text-xs font-mono text-slate-400 dark:text-slate-600 w-6 text-right">{n}</span>
      </div>
      <div className="min-w-0">
        <p className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate group-hover:text-blue-600 dark:group-hover:text-blue-400">
          {q.title || plainText(q.question)}
        </p>
        <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 truncate hidden sm:block">{plainText(q.question)}</p>
        <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5 sm:hidden">{q.topic} · {q.difficulty}</p>
      </div>
      <div className="hidden sm:flex items-center gap-2 text-sm text-slate-600 dark:text-slate-300">
        <span className={`w-2 h-2 rounded-full ${TOPIC_DOT[q.topic]||"bg-slate-400"}`}></span>{q.topic}
      </div>
      <div className="hidden sm:block"><DiffPill d={q.difficulty} /></div>
      <div className="hidden sm:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">{sourceDisplay(q)}</div>
      <div className="hidden sm:block text-xs text-slate-400 dark:text-slate-500 whitespace-nowrap">
        {q.date_added ? new Date(q.date_added).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : "—"}
      </div>
    </button>
  );
}

// ── Shared "History on this problem / My Notes / Similar Problems" widgets ───
// Rendered once here, then placed inside a mobile (lg:hidden) and a desktop
// (hidden lg:flex) wrapper by ProblemView, instead of being duplicated.
function ProblemSidebarSections({ stat, notes, authUser, noteText, setNoteText, saveNote, deleteNote, notesSaving, similarQuestions, onOpenQuestion }) {
  return (
    <>
      {/* History */}
      {stat && stat.attempts > 0 && (
        <div className="rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 px-4 py-3">
          <p className="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2">Your history on this problem</p>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div>
              <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{Math.round(100*stat.correct/stat.attempts)}%</p>
              <p className="text-[11px] text-slate-400 dark:text-slate-500">{stat.correct}/{stat.attempts} correct</p>
            </div>
            <div>
              <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{fmtTime(stat.bestMs)}</p>
              <p className="text-[11px] text-slate-400 dark:text-slate-500">best time</p>
            </div>
            <div>
              <p className="text-lg font-bold text-slate-800 dark:text-slate-100">{fmtTime(stat.lastMs)}</p>
              <p className="text-[11px] text-slate-400 dark:text-slate-500">last time</p>
            </div>
          </div>
        </div>
      )}

      {/* Notes */}
      <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/60">
        <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2">
          <p className="text-sm font-bold text-slate-700 dark:text-slate-200">My Notes</p>
          {!authUser && <span className="ml-auto text-xs text-slate-400 dark:text-slate-500">Sign in to save notes</span>}
        </div>
        {notes.length > 0 && (
          <div className="divide-y divide-slate-200 dark:divide-slate-800">
            {notes.map(n => (
              <div key={n.id} className="px-4 py-3 flex items-start gap-3 group">
                <div className="flex-1">
                  <p className="text-sm text-slate-700 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">{n.note_text}</p>
                  <p className="text-xs text-slate-400 dark:text-slate-600 mt-1">{new Date(n.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}</p>
                </div>
                <button onClick={()=>deleteNote(n.id)} className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-rose-500 dark:hover:text-rose-400 transition-all text-lg leading-none shrink-0 mt-0.5">×</button>
              </div>
            ))}
          </div>
        )}
        {authUser ? (
          <div className="px-4 py-3">
            <textarea value={noteText} onChange={e=>setNoteText(e.target.value)}
              onKeyDown={e=>{ if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) saveNote(); }}
              placeholder="Add a note for this problem… (Cmd+Enter to save)" rows={3}
              className="w-full text-sm px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-600 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            <button onClick={saveNote} disabled={!noteText.trim() || notesSaving}
              className={`mt-2 px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors ${noteText.trim() ? "bg-blue-600 hover:bg-blue-700 text-white" : "bg-slate-100 dark:bg-slate-800 text-slate-400 cursor-not-allowed"}`}>
              {notesSaving ? "Saving…" : "Save Note"}
            </button>
          </div>
        ) : (
          <div className="px-4 py-3">
            <p className="text-xs text-slate-400 dark:text-slate-500"><a href="./index.html" className="text-blue-500 hover:underline">Sign in</a> to add and save notes.</p>
          </div>
        )}
      </div>

      {/* Similar Problems */}
      {similarQuestions.length > 0 && (
        <div className="rounded-2xl border border-slate-200 dark:border-slate-800">
          <div className="px-4 py-3 bg-slate-50 dark:bg-slate-900/60 border-b border-slate-200 dark:border-slate-800 rounded-t-2xl">
            <p className="text-sm font-bold text-slate-700 dark:text-slate-200">Practice Similar Problems</p>
            <p className="text-xs text-slate-400 dark:text-slate-500 mt-0.5">Build speed by drilling the same question pattern.</p>
          </div>
          <div className="divide-y divide-slate-100 dark:divide-slate-800">
            {similarQuestions.map(sq => (
              <div key={sq.id} className="px-4 py-3 flex items-center gap-3 hover:bg-slate-50 dark:hover:bg-slate-900/40 transition-colors">
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate">{sq.title || plainText(sq.question)}</p>
                  <div className="flex items-center gap-1.5 mt-1 flex-wrap">
                    <span className={`w-1.5 h-1.5 rounded-full ${TOPIC_DOT[sq.topic]||"bg-slate-400"}`}></span>
                    <span className="text-xs text-slate-500 dark:text-slate-400">{sq.topic}</span>
                    <DiffPill d={sq.difficulty} />
                    {sq.sharedTags && sq.sharedTags.slice(0,2).map(t =>
                      <span key={t} className="text-xs px-1.5 py-0.5 bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400 rounded-full">#{t}</span>
                    )}
                  </div>
                </div>
                <button onClick={()=>onOpenQuestion(sq.id)} className="shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-colors">Open</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

function ProblemView({ q, onClose, onAnswered, prevAnswer, stat, onPrev, onNext, hasPrev, hasNext, isBookmarked, onToggleBookmark, authUser, allQuestions, answeredIds, onOpenQuestion }) {
  const [pending, setPending]   = useState(null);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [crossed, setCrossed]   = useState({});
  // Notes state
  const [notes, setNotes]       = useState([]);
  const [noteText, setNoteText] = useState("");
  const [notesSaving, setNotesSaving] = useState(false);
  const [attemptSessionId, setAttemptSessionId] = useState(null);
  const [submitError, setSubmitError] = useState("");
  const [serverResult, setServerResult] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [showReportIssue, setShowReportIssue] = useState(false);
  const timer = useTimer();
  const startRef = useRef(Date.now());

  // Reset per-question interaction state whenever the question itself changes.
  useEffect(() => {
    setPending(null);
    setSelected(null);
    setAnswered(false);
    setCrossed({});
    setNoteText("");
    setAttemptSessionId(null);
    setSubmitError("");
    setServerResult(null);
    setSubmitting(false);
    timer.reset();
    timer.start(); startRef.current = Date.now();
  }, [q.id]);

  // Start the attempt session and fetch notes for this question. Depends on
  // authUser as well as q.id -- on a slow session restore, authUser can
  // resolve after this view already mounted, and without this dependency
  // notes/the attempt session would silently never load for that question.
  useEffect(() => {
    if (!authUser) { setNotes([]); return; }

    _supabase.rpc("start_question_attempt", { p_question_id: q.id })
      .then(({ data, error }) => {
        if (error) {
          console.warn("start_question_attempt error:", error.message);
          setSubmitError(error.message);
        } else {
          setAttemptSessionId(data);
        }
      });

    _supabase.from('notes')
      .select('*')
      .eq('user_id', authUser.id)
      .eq('question_id', q.id)
      .order('created_at', { ascending: true })
      .then(({ data }) => setNotes(data || []));
  }, [q.id, authUser?.id]);

  const saveNote = async () => {
    if (!noteText.trim() || !authUser) return;
    setNotesSaving(true);
    const { data, error } = await _supabase.from('notes').insert({
      user_id: authUser.id,
      question_id: q.id,
      note_text: noteText.trim(),
    }).select();
    if (!error && data) {
      setNotes(prev => [...prev, data[0]]);
      setNoteText("");
    }
    setNotesSaving(false);
  };

  const deleteNote = async (noteId) => {
    await _supabase.from('notes').delete().eq('id', noteId);
    setNotes(prev => prev.filter(n => n.id !== noteId));
  };

  // Left-click: select/deselect a choice (pending, not yet submitted)
  const handlePick = (choice) => {
    if (answered) return;
    setPending(p => p === choice ? null : choice);
  };

  // Right-click: cross out / un-cross a choice
  const handleCross = (e, choice) => {
    e.preventDefault();
    if (answered) return;
    setCrossed(prev => ({ ...prev, [choice]: !prev[choice] }));
  };

  // Submit button handler — answer checking happens securely in Supabase.
  const handleSubmit = async () => {
    if (answered || !pending || submitting) return;

    if (!authUser) {
      setSubmitError("Please sign in to submit answers securely.");
      return;
    }

    if (!attemptSessionId) {
      setSubmitError("Question session is not ready yet. Wait a moment and try again.");
      return;
    }

    const timeMs = Date.now() - startRef.current;
    setSubmitting(true);
    setSubmitError("");

    const { data, error } = await _supabase.rpc("submit_answer", {
      p_session_id: attemptSessionId,
      p_question_id: q.id,
      p_selected_answer: pending,
      p_time_taken_ms: timeMs,
    });

    setSubmitting(false);

    if (error) {
      setSubmitError(error.message || "Could not submit answer.");
      return;
    }

    const result = Array.isArray(data) ? data[0] : data;
    if (!result) {
      setSubmitError("No result returned from Supabase.");
      return;
    }

    setSelected(pending);
    setAnswered(true);
    timer.stop();
    setServerResult(result);

    onAnswered && onAnswered({
      questionId:    q.id,
      questionTitle: q.title || null,
      questionText:  q.question || null,
      topic:         q.topic,
      difficulty:    q.difficulty,
      selected:      pending,
      correctAnswer: result.correct_answer,
      correct:       !!result.is_correct,
      timeMs,
      explanation:   result.explanation || null,
      tags:          q.tags || [],
    });
  };

  const correctAnswer = serverResult?.correct_answer || prevAnswer?.correctAnswer || null;
  const explanationText = serverResult?.explanation || prevAnswer?.explanation || null;
  const hasServerResult = answered && !!correctAnswer;

  const choiceLetter = (choice, idx = null) => {
    const s = String(choice || "").trim();
    const m = s.match(/^\(?([A-E])\)?[\s.)-]*/i);
    if (m) return m[1].toUpperCase();
    return idx != null ? String.fromCharCode(65 + idx) : "";
  };

  const normalizeAnswer = (value) => {
    const s = String(value || "").trim();
    const m = s.match(/^\(?([A-E])\)?(?:\s|\.|\)|-|$)/i);
    if (m) return m[1].toUpperCase();
    return s.toLowerCase();
  };

  const answerMatches = (choice, answer, idx = null) => {
    if (!choice || !answer) return false;
    const c = String(choice).trim();
    const a = String(answer).trim();
    const cLetter = choiceLetter(c, idx);
    const aNorm = normalizeAnswer(a);
    return c === a || c.toLowerCase() === a.toLowerCase() || cLetter === aNorm;
  };

  const selectedMatchesChoice = (choice, idx = null) => {
    return selected === choice || answerMatches(choice, selected, idx);
  };

  const isCorrect = answered && (
    serverResult?.is_correct === true ||
    prevAnswer?.correct === true ||
    (selected && correctAnswer && answerMatches(selected, correctAnswer))
  );

  const choiceClass = (choice, idx = null) => {
    const isCrossed = crossed[choice] && !answered;
    const isSelectedChoice = selectedMatchesChoice(choice, idx);
    const isCorrectChoice = (isCorrect && isSelectedChoice) || answerMatches(choice, correctAnswer, idx);

    if (!answered) {
      if (pending === choice) return "border-blue-500 bg-blue-50 dark:bg-blue-500/10 dark:border-blue-400 cursor-pointer";
      if (isCrossed) return "border-slate-200 bg-slate-50 dark:border-slate-700 dark:bg-slate-900/50 opacity-40 cursor-pointer";
      return "border-slate-200 bg-white hover:border-blue-300 hover:bg-blue-50/50 cursor-pointer dark:border-slate-700 dark:bg-slate-900 dark:hover:border-blue-600 dark:hover:bg-slate-800";
    }
    if (hasServerResult && isCorrectChoice) return "border-emerald-400 bg-emerald-50 text-emerald-800 dark:border-emerald-500/50 dark:bg-emerald-500/10 dark:text-emerald-300";
    if (isSelectedChoice && !isCorrect) return "border-rose-400 bg-rose-50 text-rose-800 dark:border-rose-500/50 dark:bg-rose-500/10 dark:text-rose-300";
    return "border-slate-200 bg-slate-50 text-slate-400 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-600";
  };

  // compute similar questions once
  const similarQuestions = React.useMemo(() => {
    const pool = allQuestions.length > 0 ? allQuestions : [];
    if (pool.length <= 1) return [];
    const others = pool.filter(x => x.id !== q.id);
    const scored = others.map(x => {
      let score = 0;
      const sharedTags = (q.tags || []).filter(t => (x.tags || []).includes(t));
      score += sharedTags.length * 10;
      if (x.topic === q.topic) score += 4;
      if (x.difficulty === q.difficulty) score += 2;
      return { x, score, sharedTags };
    });
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, 3).map(s => ({ ...s.x, sharedTags: s.sharedTags }));
  }, [q.id, allQuestions]);

  return (
    <div className="fixed inset-0 z-50 flex flex-col bg-white dark:bg-slate-950 overflow-hidden">
      <div className="w-full max-w-7xl mx-auto flex flex-col h-[100dvh] max-h-[100dvh] overflow-hidden">

        {/* ── header ── */}
        <div className="border-b border-slate-200 dark:border-slate-700 flex-shrink-0 bg-white dark:bg-slate-950 z-10 shadow-sm dark:shadow-slate-900">
          <div className="flex items-center justify-between px-3 sm:px-5 pt-2.5 sm:pt-3 pb-2.5 sm:pb-3 gap-2 sm:gap-3">

            {/* Left: topic + diff + source + date */}
            <div className="flex items-center gap-2 flex-wrap min-w-0">
              <span className="flex items-center gap-1.5 text-sm font-semibold text-slate-700 dark:text-slate-200">
                <span className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${TOPIC_DOT[q.topic]}`}></span>
                {q.topic}
              </span>
              <DiffPill d={q.difficulty} />
              {q.source && (
                <span className="hidden sm:inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-xs font-semibold border border-slate-200 dark:border-slate-700">
                  {sourceDisplay(q)}
                </span>
              )}
              {q.date_added && (
                <span className="hidden md:inline text-xs font-medium text-slate-500 dark:text-slate-400 whitespace-nowrap">
                  Added {new Date(q.date_added).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
                </span>
              )}
            </div>

            {/* Right: timer + bookmark + close */}
            <div className="flex items-center gap-1 sm:gap-2 flex-shrink-0">
              {/* Timer */}
              <div className={`flex items-center gap-1 px-2 sm:px-3 py-1.5 rounded-lg border font-mono text-xs sm:text-sm font-bold tabular-nums transition-colors
                ${answered
                  ? "bg-slate-100 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500"
                  : "bg-blue-50 dark:bg-blue-500/10 border-blue-200 dark:border-blue-500/40 text-blue-700 dark:text-blue-300"}`}>
                <svg className="w-3 h-3 sm:w-3.5 sm:h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" strokeWidth="2"/>
                  <path strokeLinecap="round" strokeWidth="2" d="M12 6v6l4 2"/>
                </svg>
                {timer.fmt}
              </div>
              <button onClick={()=>setShowReportIssue(true)} title="Report a question issue"
                className="flex items-center gap-1 px-2 sm:px-3 py-1.5 rounded-lg text-xs sm:text-sm font-semibold border bg-slate-50 border-slate-200 text-slate-600 hover:border-rose-300 hover:text-rose-600 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-300 dark:hover:border-rose-500 dark:hover:text-rose-400 transition-all">
                <span className="hidden sm:inline">Report</span>
              </button>
              <button onClick={onToggleBookmark} title={isBookmarked ? "Remove bookmark" : "Bookmark for review"}
                className={`flex items-center gap-1.5 px-2 sm:px-3 py-1.5 rounded-lg text-xs sm:text-sm font-semibold border transition-all whitespace-nowrap
                  ${isBookmarked
                    ? "bg-amber-50 border-amber-300 text-amber-700 dark:bg-amber-500/15 dark:border-amber-500/40 dark:text-amber-400"
                    : "bg-slate-50 border-slate-200 text-slate-600 hover:border-amber-300 hover:text-amber-600 dark:bg-slate-900 dark:border-slate-700 dark:text-slate-300 dark:hover:border-amber-500 dark:hover:text-amber-400"}`}>
                <span>{isBookmarked ? "Saved" : "Review Later"}</span>
              </button>
              <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 text-xl leading-none transition-colors">×</button>
            </div>
          </div>

          {/* Title row */}
          {q.title && (
            <div className="px-3 sm:px-5 pb-2.5 sm:pb-3">
              <h2 className="font-display text-lg sm:text-xl font-black text-slate-900 dark:text-white tracking-tight leading-tight">{q.title}</h2>
            </div>
          )}
        </div>

        {/* ── two-column body after answering, single column before ── */}
        <div className={`flex-1 min-h-0 overflow-y-auto overscroll-contain ${answered ? "flex flex-col lg:flex-row pb-32 sm:pb-6" : "flex flex-col pb-3"}`}>

          {/* ── LEFT column: question + choices + explanation + tags ── */}
          <div className={answered ? "lg:flex-1 lg:min-w-0 flex flex-col" : "flex flex-col"}>

            {/* ── question ── */}
            <div className="px-4 sm:px-6 pt-4 sm:pt-5 pb-4">
              <p className="text-slate-800 dark:text-slate-100 font-medium text-base leading-relaxed whitespace-pre-line">
                <MathText text={q.question} />
              </p>
              {q.image && (
                <div className="mt-4 flex justify-center">
                  <img src={q.image} alt="Figure for problem"
                    className="max-w-full sm:max-w-md rounded-xl border border-slate-200 dark:border-slate-700 bg-white" />
                </div>
              )}
            </div>

            {/* ── hint ── */}
            {!answered && (
              <p className="px-4 sm:px-6 pb-2 text-xs text-slate-400 dark:text-slate-500">
                Click to select · Right-click to cross out · Press <kbd className="px-1 py-0.5 rounded bg-slate-100 dark:bg-slate-800 font-mono text-[10px]">Submit</kbd> to check
              </p>
            )}

            {/* ── choices ── */}
            <div className="px-4 sm:px-6 pb-4 grid gap-2.5">
              {q.choices.map((choice, i) => (
                <button key={i}
                  onClick={() => handlePick(choice)}
                  onContextMenu={(e) => handleCross(e, choice)}
                  className={`w-full text-left px-3 sm:px-4 py-3 rounded-xl border-2 text-sm font-medium transition-all duration-150 flex items-center gap-3 select-none ${choiceClass(choice, i)}`}>
                  <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs shrink-0 font-black relative transition-all
                    ${answered && ((isCorrect && selectedMatchesChoice(choice, i)) || answerMatches(choice, correctAnswer, i))
                      ? "bg-emerald-500 text-white border-2 border-emerald-500"
                      : answered && selectedMatchesChoice(choice, i) && !isCorrect
                        ? "bg-rose-500 text-white border-2 border-rose-500"
                        : pending === choice && !answered
                          ? "bg-blue-500 text-white border-2 border-blue-500"
                          : "border-2 border-slate-300 dark:border-slate-600 text-slate-400 dark:text-slate-500"}
                    ${crossed[choice] && !answered ? "opacity-30" : ""}`}>
                    {String.fromCharCode(65+i)}
                    {crossed[choice] && !answered && (
                      <span className="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <span className="w-full h-0.5 bg-current rotate-45 absolute"></span>
                      </span>
                    )}
                  </span>
                  <span className={crossed[choice] && !answered ? "line-through opacity-50" : ""}>
                    <MathText text={choice.replace(/^\([A-E]\)\s*/, '')} />
                  </span>
                  {!answered && crossed[choice] && (
                    <span className="ml-auto text-slate-400 text-xs">✕</span>
                  )}
                  {answered && (((isCorrect && selectedMatchesChoice(choice, i)) || answerMatches(choice, correctAnswer, i))) && <span className="ml-auto text-emerald-600 dark:text-emerald-400 font-bold text-base">✓</span>}
                  {answered && selectedMatchesChoice(choice, i) && !isCorrect && <span className="ml-auto text-rose-500 font-bold text-base">✗</span>}
                </button>
              ))}
            </div>

            {/* ── submit button (pre-answer) ── */}
            {!answered && (
              <div className="sticky bottom-0 z-20 px-4 sm:px-6 pt-2 pb-[calc(1rem+env(safe-area-inset-bottom))] bg-white/95 dark:bg-slate-950/95 backdrop-blur border-t border-slate-100 dark:border-slate-800">
                {submitError && (
                  <p className="mb-2 text-sm text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-500/10 border border-rose-200 dark:border-rose-500/30 rounded-lg px-3 py-2">
                    {submitError}
                  </p>
                )}
                <button onClick={handleSubmit} disabled={!pending || submitting || !authUser}
                  className={`w-full py-3 rounded-xl text-sm font-bold transition-all
                    ${pending && !submitting && authUser
                      ? "bg-blue-600 hover:bg-blue-700 text-white shadow-sm"
                      : "bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-600 cursor-not-allowed"}`}>
                  {!authUser ? "Sign in to submit securely" : submitting ? "Submitting…" : pending ? "Submit Answer" : "Select an answer first"}
                </button>
              </div>
            )}

            {/* ── explanation (post-answer) ── */}
            {answered && (
              <div className={`mx-4 sm:mx-6 mb-5 rounded-2xl p-6 sm:p-8 border flex flex-col
                ${isCorrect ? "bg-emerald-50 border-emerald-200 dark:bg-emerald-500/10 dark:border-emerald-500/30"
                            : "bg-rose-50 border-rose-200 dark:bg-rose-500/10 dark:border-rose-500/30"}`}>
                <div className={`font-bold text-base mb-3 ${isCorrect ? "text-emerald-700 dark:text-emerald-300" : "text-rose-700 dark:text-rose-300"}`}>
                  {isCorrect ? "✓ Correct!" : `✗ Incorrect — Correct: ${correctAnswer}`}{` · Time: ${timer.fmt}`}
                </div>
                <div className="mt-1 text-slate-800 dark:text-slate-200 text-base sm:text-lg leading-relaxed whitespace-normal break-words">
                  <div className="overflow-x-auto max-w-full">
                    <MathText text={explanationText || ""} />
                  </div>
                </div>
              </div>
            )}

            {answered && <CommunitySolutions q={q} authUser={authUser} answered={answered} />}

            {/* ── tags ── */}
            <div className="px-4 sm:px-6 pb-4 flex flex-wrap gap-1.5">
              {q.tags.map(t => <span key={t} className="text-xs px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-full">#{t}</span>)}
            </div>

            {/* on mobile, show sidebar sections inline after answering */}
            {answered && (
              <div className="lg:hidden flex flex-col gap-4 px-6 pb-4">
                <ProblemSidebarSections stat={stat} notes={notes} authUser={authUser}
                  noteText={noteText} setNoteText={setNoteText} saveNote={saveNote} deleteNote={deleteNote}
                  notesSaving={notesSaving} similarQuestions={similarQuestions} onOpenQuestion={onOpenQuestion} />
              </div>
            )}

          </div>{/* end left column */}

          {/* ── RIGHT sidebar: only on desktop, only after answering ── */}
          {answered && (
            <div className="hidden lg:flex flex-col gap-4 w-80 xl:w-96 shrink-0 border-l border-slate-100 dark:border-slate-800 px-5 pt-5 pb-4 overflow-y-auto">
              <ProblemSidebarSections stat={stat} notes={notes} authUser={authUser}
                noteText={noteText} setNoteText={setNoteText} saveNote={saveNote} deleteNote={deleteNote}
                notesSaving={notesSaving} similarQuestions={similarQuestions} onOpenQuestion={onOpenQuestion} />
            </div>
          )}{/* end right sidebar */}

        </div>{/* end two-column body */}

        {showReportIssue && (
          <ReportIssueModal q={q} authUser={authUser} onClose={()=>setShowReportIssue(false)} />
        )}

        {/* ── nav footer ── */}
        <div className="grid grid-cols-2 sm:flex sm:items-center sm:justify-between gap-2 sm:gap-3 px-3 sm:px-6 py-3 sm:py-4 border-t border-slate-100 dark:border-slate-800 flex-shrink-0 bg-white dark:bg-slate-950 pb-[calc(0.75rem+env(safe-area-inset-bottom))]">
          <button onClick={onPrev} disabled={!hasPrev}
            className={`w-full sm:w-auto px-3 sm:px-4 py-2.5 rounded-lg text-sm font-semibold whitespace-nowrap ${hasPrev
              ? "bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 hover:bg-slate-200 dark:hover:bg-slate-700"
              : "bg-slate-50 dark:bg-slate-900 text-slate-300 dark:text-slate-700 cursor-not-allowed"}`}>← Prev</button>
          <button onClick={onClose} className="w-full sm:w-auto px-3 sm:px-4 py-2.5 rounded-lg text-sm font-semibold whitespace-nowrap text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700">Back to List</button>
          <button onClick={onNext} disabled={!hasNext}
            className={`w-full sm:w-auto px-3 sm:px-4 py-2.5 rounded-lg text-sm font-semibold whitespace-nowrap ${hasNext
              ? "bg-blue-600 hover:bg-blue-700 text-white"
              : "bg-slate-50 dark:bg-slate-900 text-slate-300 dark:text-slate-700 cursor-not-allowed"}`}>Next →</button>
        </div>
      </div>
    </div>
  );
}




function AdminUserActivity({ authUser }) {
  const [loading, setLoading] = useState(true);
  const [attempts, setAttempts] = useState([]);
  const [solutions, setSolutions] = useState([]);
  const [reports, setReports] = useState([]);
  const [questions, setQuestions] = useState([]);
  const [error, setError] = useState('');
  const [selectedQuestion, setSelectedQuestion] = useState(null);
  const [selectedUser, setSelectedUser] = useState(null);

  const isAdmin = authUser && ADMIN_EMAILS.includes(authUser.email || '');

  useEffect(() => {
    if (!isAdmin) return;
    setLoading(true);
    Promise.all([
      _supabase.rpc('admin_attempts_with_users'),
      _supabase.from('community_solutions_with_votes').select('*').order('created_at', { ascending: false }).limit(1000),
      _supabase.from('question_reports').select('*').order('created_at', { ascending: false }).limit(1000),
      _supabase.from('public_questions').select('id,title,topic,difficulty,source').limit(5000),
    ]).then(([a, s, r, q]) => {
      if (a.error || s.error || r.error || q.error) {
        setError(a.error?.message || s.error?.message || r.error?.message || q.error?.message);
      }
      setAttempts(a.data || []);
      setSolutions(s.data || []);
      setReports(r.data || []);
      setQuestions(q.data || []);
      setLoading(false);
    });
  }, [isAdmin]);

  if (!isAdmin) return (
    <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-8 text-center">
      <p className="font-bold text-slate-800 dark:text-slate-100">Admin only</p>
    </div>
  );

  if (loading) return (
    <div className="flex items-center justify-center py-24">
      <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>
  );

  if (error) return (
    <div className="rounded-2xl border border-rose-200 dark:border-rose-800 bg-rose-50 dark:bg-rose-500/10 p-6 text-rose-700 dark:text-rose-300">
      Error loading admin activity: {error}
      <p className="text-sm mt-2">Make sure you ran <code>admin_activity_rpc.sql</code> in Supabase.</p>
    </div>
  );

  const now = new Date();
  const sevenDaysAgo = new Date(now); sevenDaysAgo.setDate(now.getDate() - 7);

  const qMap = {};
  questions.forEach(q => qMap[q.id] = q);

  const displayUser = (u) => u.display_name || u.user_email || u.user_id;

  const users = {};
  attempts.forEach(a => {
    const id = a.user_id || 'unknown';
    if (!users[id]) users[id] = {
      user_id:id,
      user_email:a.user_email || '',
      display_name:a.display_name || '',
      attempts:0,
      correct:0,
      totalMs:0,
      lastActive:null,
      rows: [],
    };
    users[id].attempts++;
    if (a.is_correct) users[id].correct++;
    users[id].totalMs += a.time_taken_ms || 0;
    users[id].rows.push(a);
    const d = new Date(a.created_at);
    if (!users[id].lastActive || d > users[id].lastActive) users[id].lastActive = d;
  });

  const userRows = Object.values(users)
    .map(u => ({ ...u, accuracy: u.attempts ? Math.round(100*u.correct/u.attempts) : 0, avgMs: u.attempts ? Math.round(u.totalMs/u.attempts) : 0 }))
    .sort((a,b) => b.attempts - a.attempts);

  const active7 = userRows.filter(u => u.lastActive && u.lastActive >= sevenDaysAgo).length;

  attempts.forEach(a => {
    const id = a.question_id;
    if (!qMap[id]) qMap[id] = { id, title:a.question_title || 'Question #' + id, topic:a.topic, difficulty:a.difficulty };
    if (!qMap[id].stats) qMap[id].stats = { attempts:0, wrong:0, correct:0, totalMs:0, rows:[] };
    qMap[id].stats.attempts++;
    if (!a.is_correct) qMap[id].stats.wrong++;
    if (a.is_correct) qMap[id].stats.correct++;
    qMap[id].stats.totalMs += a.time_taken_ms || 0;
    qMap[id].stats.rows.push(a);
  });

  const questionStats = Object.values(qMap)
    .filter(q => q.stats && q.stats.attempts > 0)
    .map(q => ({
      ...q,
      attempts: q.stats.attempts,
      wrong: q.stats.wrong,
      correct: q.stats.correct,
      missRate: Math.round(100*q.stats.wrong/q.stats.attempts),
      accuracy: Math.round(100*q.stats.correct/q.stats.attempts),
      avgMs: Math.round(q.stats.totalMs/q.stats.attempts),
      rows: q.stats.rows,
    }));

  const mostAttempted = [...questionStats].sort((a,b)=>b.attempts-a.attempts).slice(0,10);
  const mostMissed = [...questionStats].filter(q=>q.attempts>=2).sort((a,b)=>b.missRate-a.missRate || b.wrong-a.wrong).slice(0,10);
  const slowest = [...questionStats].filter(q=>q.attempts>=2).sort((a,b)=>b.avgMs-a.avgMs).slice(0,10);
  const recentAttempts = attempts.slice(0,25);

  const updateReportStatus = async (reportId, status) => {
    const { error } = await _supabase
      .from('question_reports')
      .update({ status })
      .eq('id', reportId);
    if (error) {
      alert(error.message || 'Could not update report.');
      return;
    }
    setReports(prev => prev.map(r => r.id === reportId ? { ...r, status } : r));
  };

  const deleteReport = async (reportId) => {
    if (!confirm('Delete this report?')) return;
    const { error } = await _supabase.from('question_reports').delete().eq('id', reportId);
    if (error) {
      alert(error.message || 'Could not delete report.');
      return;
    }
    setReports(prev => prev.filter(r => r.id !== reportId));
  };

  const Card = ({label,value,sub}) => (
    <div className="rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 shadow-sm">
      <p className="text-2xl font-black text-slate-900 dark:text-white">{value}</p>
      <p className="text-xs font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500 mt-1">{label}</p>
      {sub && <p className="text-xs text-slate-500 dark:text-slate-400 mt-1">{sub}</p>}
    </div>
  );

  const QuestionLink = ({ q, children }) => (
    <button onClick={()=>setSelectedQuestion(q)}
      className="text-left font-semibold text-slate-800 dark:text-slate-100 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer transition-colors truncate">
      {children || q.title || 'Question #' + q.id}
    </button>
  );

  const UserLink = ({ u }) => (
    <button onClick={()=>setSelectedUser(u)}
      className="text-left font-semibold text-slate-800 dark:text-slate-100 hover:text-blue-600 dark:hover:text-blue-400 cursor-pointer transition-colors truncate">
      {displayUser(u)}
    </button>
  );

  const MiniTable = ({title, rows, type}) => (
    <div className="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 overflow-hidden shadow-sm">
      <div className="px-4 py-3 border-b border-slate-200 dark:border-slate-800">
        <h3 className="font-bold text-slate-800 dark:text-slate-100">{title}</h3>
      </div>
      <div className="divide-y divide-slate-100 dark:divide-slate-800">
        {rows.length === 0 ? <p className="p-4 text-sm text-slate-400">No data yet.</p> : rows.map((row, i) => (
          <div key={row.id || row.user_id || i} className="px-4 py-3">
            <p className="text-sm truncate">
              {type === 'user' ? <UserLink u={row} /> : <QuestionLink q={row} />}
            </p>
            <p className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">
              {type === 'user'
                ? `${row.attempts} attempts · ${row.accuracy}% accuracy · avg ${fmtTime(row.avgMs)} · last ${row.lastActive ? row.lastActive.toLocaleDateString() : '—'}`
                : `${row.attempts} attempts · ${row.missRate ?? 0}% missed · avg ${fmtTime(row.avgMs || 0)} · ${row.topic || ''}`}
            </p>
          </div>
        ))}
      </div>
    </div>
  );

  const UserModal = ({ u, onClose }) => {
    const [deleting, setDeleting] = useState(false);
    const [deleteMessage, setDeleteMessage] = useState('');
    const [rangeStart, setRangeStart] = useState('');
    const [rangeEnd, setRangeEnd] = useState('');

    const topicMap = {};
    const colMap = {};
    u.rows.forEach(r => {
      if (!topicMap[r.topic]) topicMap[r.topic] = { attempts:0, correct:0 };
      topicMap[r.topic].attempts++;
      if (r.is_correct) topicMap[r.topic].correct++;
      const col = getColumnCategory(r);
      if (col) {
        if (!colMap[col]) colMap[col] = { attempts:0, correct:0 };
        colMap[col].attempts++;
        if (r.is_correct) colMap[col].correct++;
      }
    });
    const topicRows = Object.entries(topicMap).map(([topic,v]) => ({ topic, ...v, accuracy: Math.round(100*v.correct/v.attempts) })).sort((a,b)=>a.accuracy-b.accuracy);
    const colRows = ['Column 1','Column 2','Column 3'].map(c => {
      const v = colMap[c] || { attempts:0, correct:0 };
      return { column:c, ...v, accuracy:v.attempts ? Math.round(100*v.correct/v.attempts) : 0 };
    });

    const deleteAttempts = async () => {
      const ok = confirm(`Delete ALL attempts for ${displayUser(u)}? This cannot be undone.`);
      if (!ok) return;
      setDeleting(true);
      setDeleteMessage('');
      const { data, error } = await _supabase.rpc('admin_delete_user_attempts', { p_user_id: u.user_id });
      setDeleting(false);
      if (error) {
        setDeleteMessage(error.message || 'Could not delete attempts.');
        return;
      }
      setDeleteMessage(`Deleted ${data} attempts. Refreshing…`);
      setTimeout(()=>window.location.reload(), 800);
    };

    const deleteAllSiteData = async () => {
      const ok = confirm(`Delete ALL site data for ${displayUser(u)}? This includes attempts, notes, reports, votes, and community solutions. This cannot be undone.`);
      if (!ok) return;
      setDeleting(true);
      setDeleteMessage('');
      const { data, error } = await _supabase.rpc('admin_delete_user_site_data', { p_user_id: u.user_id });
      setDeleting(false);
      if (error) {
        setDeleteMessage(error.message || 'Could not delete user data.');
        return;
      }
      setDeleteMessage(`Deleted user site data: ${JSON.stringify(data)}. Refreshing…`);
      setTimeout(()=>window.location.reload(), 1000);
    };

    const deleteRange = async () => {
      if (!rangeStart || !rangeEnd) {
        setDeleteMessage('Choose both start and end times.');
        return;
      }
      const ok = confirm(`Delete attempts by ${displayUser(u)} from ${rangeStart} to ${rangeEnd}?`);
      if (!ok) return;
      setDeleting(true);
      setDeleteMessage('');
      const { data, error } = await _supabase.rpc('admin_delete_user_attempts_between', {
        p_user_id: u.user_id,
        p_start: new Date(rangeStart).toISOString(),
        p_end: new Date(rangeEnd).toISOString(),
      });
      setDeleting(false);
      if (error) {
        setDeleteMessage(error.message || 'Could not delete attempts in range.');
        return;
      }
      setDeleteMessage(`Deleted ${data} attempts in that time range. Refreshing…`);
      setTimeout(()=>window.location.reload(), 900);
    };

    return (
      <div className="fixed inset-0 z-[70] flex items-center justify-center p-4" onClick={onClose}>
        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div className="relative z-10 w-full max-w-3xl max-h-[90vh] overflow-y-auto bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-2xl" onClick={e=>e.stopPropagation()}>
          <div className="p-5 border-b border-slate-200 dark:border-slate-800 flex justify-between gap-4">
            <div>
              <h2 className="font-display text-2xl font-black text-slate-900 dark:text-white">{displayUser(u)}</h2>
              <p className="text-xs text-slate-500 dark:text-slate-400">{u.user_email || u.user_id}</p>
            </div>
            <button onClick={onClose} className="w-8 h-8 rounded-lg text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 text-xl">×</button>
          </div>
          <div className="p-5 space-y-6">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              <Card label="Attempts" value={u.attempts} />
              <Card label="Accuracy" value={u.accuracy + '%'} />
              <Card label="Avg Time" value={fmtTime(u.avgMs)} />
              <Card label="Last Active" value={u.lastActive ? u.lastActive.toLocaleDateString() : '—'} />
            </div>

            <div className="rounded-xl border border-rose-200 dark:border-rose-800 bg-rose-50 dark:bg-rose-500/10 p-4">
              <h3 className="font-bold text-rose-800 dark:text-rose-300 mb-2">Admin Data Management</h3>
              <p className="text-xs text-rose-700 dark:text-rose-300 mb-3">
                Use this to clean spam data. It does not delete the user's Supabase Auth account; it deletes stored site activity.
              </p>
              <div className="flex flex-wrap gap-2 mb-4">
                <button onClick={deleteAttempts} disabled={deleting}
                  className="px-3 py-2 rounded-lg text-xs font-bold bg-rose-600 hover:bg-rose-700 text-white disabled:opacity-50">
                  Delete All Attempts
                </button>
                <button onClick={deleteAllSiteData} disabled={deleting}
                  className="px-3 py-2 rounded-lg text-xs font-bold bg-red-700 hover:bg-red-800 text-white disabled:opacity-50">
                  Delete All User Site Data
                </button>
              </div>
              <div className="grid sm:grid-cols-[1fr_1fr_auto] gap-2 items-end">
                <div>
                  <label className="block text-[11px] font-bold uppercase tracking-wider text-rose-700 dark:text-rose-300 mb-1">Start</label>
                  <input type="datetime-local" value={rangeStart} onChange={e=>setRangeStart(e.target.value)}
                    className="w-full px-2 py-2 rounded-lg border border-rose-200 dark:border-rose-800 bg-white dark:bg-slate-900 text-xs" />
                </div>
                <div>
                  <label className="block text-[11px] font-bold uppercase tracking-wider text-rose-700 dark:text-rose-300 mb-1">End</label>
                  <input type="datetime-local" value={rangeEnd} onChange={e=>setRangeEnd(e.target.value)}
                    className="w-full px-2 py-2 rounded-lg border border-rose-200 dark:border-rose-800 bg-white dark:bg-slate-900 text-xs" />
                </div>
                <button onClick={deleteRange} disabled={deleting}
                  className="px-3 py-2 rounded-lg text-xs font-bold bg-rose-600 hover:bg-rose-700 text-white disabled:opacity-50">
                  Delete Range
                </button>
              </div>
              {deleteMessage && <p className="text-xs text-rose-700 dark:text-rose-300 mt-3">{deleteMessage}</p>}
            </div>

            <div className="grid md:grid-cols-2 gap-4">
              <div className="rounded-xl border border-slate-200 dark:border-slate-800 p-4">
                <h3 className="font-bold mb-3">Column Performance</h3>
                {colRows.map(c => <p key={c.column} className="text-sm text-slate-600 dark:text-slate-300 mb-1">{c.column}: {c.correct}/{c.attempts} · {c.accuracy}%</p>)}
              </div>
              <div className="rounded-xl border border-slate-200 dark:border-slate-800 p-4">

// Downscale an image to a sane max dimension before upload. Question diagrams only ever
// display at a few hundred px wide in the UI, so admin-uploaded screenshots/photos (which
// can easily be several thousand px and multiple MB) get shrunk client-side, never upscaled.
// GIFs are passed through untouched — canvas would flatten an animated GIF to one frame.
async function resizeImageForUpload(file, { maxDim = MAX_IMAGE_DIMENSION, jpegQuality = 0.85 } = {}) {
  if (file.type === 'image/gif') return file;

  let bitmap;
  try {
    bitmap = await createImageBitmap(file);
  } catch (e) {
    return file; // unreadable as an image — let the normal upload/validation handle it
  }

  const scale = Math.min(1, maxDim / Math.max(bitmap.width, bitmap.height));
  const width = Math.round(bitmap.width * scale);
  const height = Math.round(bitmap.height * scale);

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  canvas.getContext('2d').drawImage(bitmap, 0, 0, width, height);

  // PNG stays PNG (crisp lines + transparency for diagrams); everything else re-encodes
  // as JPEG at a controlled quality to keep file size down.
  const outputType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
  const blob = await new Promise(resolve =>
    canvas.toBlob(resolve, outputType, outputType === 'image/jpeg' ? jpegQuality : undefined)
  );
  if (!blob) return file;

  const ext = outputType === 'image/png' ? 'png' : 'jpg';
  const newName = file.name.replace(/\.[^.]+$/, '') + `-resized.${ext}`;
  return new File([blob], newName, { type: outputType });
}

// Uploads via a raw fetch with a freshly-read access token instead of going through
// _supabase.storage -- the SDK's storage sub-client is created lazily on first access and
// can bake in whatever Authorization header existed at that moment (e.g. anon-only, if
// anything touches .storage before the session finishes loading from localStorage on page
// load), and never re-reads the session again afterward. Reading the token directly here
// every call sidesteps that entirely instead of trusting the cached client.
async function uploadWithSessionRetry(bucket, path, file, options) {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) return { error: { message: 'Not signed in.' } };
  const headers = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${session.access_token}`,
    'Content-Type': options?.contentType || file.type || 'application/octet-stream',
  };
  if (options?.upsert) headers['x-upsert'] = 'true';
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${path}`, {
    method: 'POST',
    headers,
    body: file,
  });
  if (res.ok) return { error: null };
  const body = await res.json().catch(() => ({}));
  return { error: { message: body.message || body.error || `Upload failed (${res.status})` } };
}

// Avatars are always a small square photo, never need transparency or crisp vector lines,
// so unlike resizeImageForUpload above this always crops to a centered square and re-encodes
// as JPEG -- gives a small, predictable file size regardless of the source image's shape.
async function cropAndResizeAvatar(file, maxDim = MAX_AVATAR_DIMENSION) {
  let bitmap;
  try {
    bitmap = await createImageBitmap(file);
  } catch (e) {
    return file; // unreadable as an image — let the normal upload/validation handle it
  }

  const side = Math.min(bitmap.width, bitmap.height);
  const sx = (bitmap.width - side) / 2;
  const sy = (bitmap.height - side) / 2;
  const outSide = Math.min(side, maxDim);

  const canvas = document.createElement('canvas');
  canvas.width = outSide;
  canvas.height = outSide;
  canvas.getContext('2d').drawImage(bitmap, sx, sy, side, side, 0, 0, outSide, outSide);

  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));
  if (!blob) return file;
  return new File([blob], 'avatar.jpg', { type: 'image/jpeg' });
}

// supabase-js's FunctionsHttpError.message is always the hardcoded string
// "Edge Function returned a non-2xx status code" -- it never contains the
// function's actual error text, regardless of what the function returned.
// The real body lives on error.context (the raw Response), which has to be
// read and parsed separately to get anything useful to show or branch on.
async function edgeFunctionErrorMessage(error) {
  if (error?.context && typeof error.context.json === 'function') {
    try {
      const body = await error.context.clone().json();
      if (body?.error) return body.error;
    } catch (e) {}
  }
  return error?.message || String(error);
}
